name: Deploy to HostGator

# Builds the static site and uploads it to HostGator over FTPS on every push to
# main. Set these three repo secrets:
#   Settings → Secrets and variables → Actions → New repository secret
#     FTP_SERVER    ftp.beedstu.com
#     FTP_USERNAME  a DEDICATED FTP account whose Directory is set to public_html
#                   (e.g. deploy@beedstu.com) — see note on server-dir below
#     FTP_PASSWORD  that FTP account's password

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build # Next.js `output: 'export'` -> ./out

      - name: Deploy to HostGator via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps # explicit FTPS over port 21 (HostGator supports it)
          local-dir: ./out/
          # The FTP account logs in AT public_html (its Directory is set to
          # public_html), so the upload root "./" IS the web root. If you instead
          # use your main cPanel login (lands at /home3/qnz123), change this to
          # ./public_html/
          server-dir: ./
