name: Deploy to HostGator

# MANUAL DEPLOY ONLY. Pushing to GitHub does NOT publish to beedstu.com.
# To go live, deploy on purpose: repo → Actions → "Deploy to HostGator" →
# "Run workflow" → branch main → Run workflow. (Or: gh workflow run deploy.yml)
#
# Builds the static site and uploads it to HostGator over FTPS. Repo secrets:
#   Settings → Secrets and variables → Actions → New repository secret
#     FTP_SERVER    ftp.beedstu.com
#     FTP_USERNAME  a DEDICATED FTP account whose Directory is set to public_html
#                   (e.g. deploy@beedstu.com) — see note on server-dir below
#     FTP_PASSWORD  that FTP account's password

on:
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build # Next.js `output: 'export'` -> ./out
        env:
          # NEXT_PUBLIC_ vars are baked into the static HTML at build time, and
          # the Action never sees the gitignored .env.local. So the GA4 ID comes
          # from a repo Variable: Settings → Secrets and variables → Actions →
          # Variables → New variable → NEXT_PUBLIC_GA_ID = G-Q90EH2Q7HF
          # (Not secret — it ships in the public page source anyway.)
          NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}

      - name: Deploy to HostGator via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps # explicit FTPS over port 21 (HostGator supports it)
          local-dir: ./out/
          # The FTP account logs in AT public_html (its Directory is set to
          # public_html), so the upload root "./" IS the web root. If you instead
          # use your main cPanel login (lands at /home3/qnz123), change this to
          # ./public_html/
          server-dir: ./
